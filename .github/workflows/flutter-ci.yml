name: Flutter CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build Flutter Web
        run: flutter build web --release --dart-define=APP_ENV=prod --dart-define=API_BASE_URL=https://app.rossicompany.com.br

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: build/web
          if-no-files-found: error
