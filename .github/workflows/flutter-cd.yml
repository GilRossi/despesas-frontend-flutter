name: Flutter Web CD

on:
  workflow_run:
    workflows: ["Flutter CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flutter-web-cd
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter Web
        run: |
          flutter build web --release \
            --dart-define=APP_ENV=prod \
            --dart-define=API_BASE_URL=https://app.rossicompany.com.br

      - name: Validate deploy secrets presence
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          if [ -n "${VPS_HOST:-}" ]; then
            echo "VPS_HOST present: yes"
          else
            echo "VPS_HOST present: no"
            exit 1
          fi

          if [ -n "${VPS_SSH_KEY:-}" ]; then
            echo "VPS_SSH_KEY present: yes"
          else
            echo "VPS_SSH_KEY present: no"
            exit 1
          fi

      - name: Create deploy SSH directory
        run: mkdir -p ~/.ssh

      - name: Write deploy SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          umask 077
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key

      - name: Secure deploy SSH key
        run: chmod 600 ~/.ssh/deploy_key

      - name: Validate deploy host resolution
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          if getent ahosts "$VPS_HOST" >/dev/null 2>&1; then
            echo "VPS_HOST resolves: yes"
          else
            echo "VPS_HOST resolves: no"
            exit 1
          fi

      - name: Validate deploy host port 22 connectivity
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          max_attempts=5

          for attempt in $(seq 1 "$max_attempts"); do
            echo "Port 22 connectivity attempt ${attempt}/${max_attempts}"

            if timeout 10 bash -c 'cat < /dev/null > /dev/tcp/$1/22' _ "$VPS_HOST" 2>/dev/null; then
              echo "VPS_HOST port 22 reachable: yes"
              exit 0
            fi

            echo "VPS_HOST port 22 reachable: no"

            if [ "$attempt" -lt "$max_attempts" ]; then
              sleep_seconds=$((attempt * 5))
              echo "Waiting ${sleep_seconds}s before next connectivity retry"
              sleep "$sleep_seconds"
            fi
          done

          exit 1

      - name: Capture deploy host SSH key
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT

          max_attempts=5

          for attempt in $(seq 1 "$max_attempts"); do
            echo "SSH keyscan attempt ${attempt}/${max_attempts}"
            : >"$tmpdir/known_host_entry"
            : >"$tmpdir/ssh-keyscan.stderr"

            if timeout 15 ssh-keyscan -T 10 -H "$VPS_HOST" >"$tmpdir/known_host_entry" 2>"$tmpdir/ssh-keyscan.stderr" && [ -s "$tmpdir/known_host_entry" ]; then
              cat "$tmpdir/known_host_entry" >> ~/.ssh/known_hosts
              echo "ssh-keyscan succeeded: yes"
              exit 0
            fi

            echo "ssh-keyscan succeeded: no"

            if [ "$attempt" -lt "$max_attempts" ]; then
              sleep_seconds=$((attempt * 5))
              echo "Waiting ${sleep_seconds}s before next ssh-keyscan retry"
              sleep "$sleep_seconds"
            fi
          done

          exit 1

      - name: Deploy web build to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            build/web/ \
            "root@$VPS_HOST:/srv/despesas/frontend-web/current/"

      - name: Smoke check
        run: |
          sleep 5
          scripts/run_production_surface_smoke.sh
