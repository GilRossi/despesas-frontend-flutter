name: Flutter Web CD

on:
  workflow_run:
    workflows: ["Flutter CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flutter-web-cd
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter Web
        run: |
          flutter build web --release \
            --dart-define=APP_ENV=prod \
            --dart-define=API_BASE_URL=https://app.rossicompany.com.br

      - name: Setup deploy SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy web build to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            build/web/ \
            "root@$VPS_HOST:/srv/despesas/frontend-web/current/"

      - name: Smoke check
        run: |
          sleep 5
          STATUS=$(curl -sk -o /dev/null -w '%{http_code}' \
            https://app.rossicompany.com.br/)
          echo "Frontend: $STATUS"
          [ "$STATUS" = "200" ] || (echo "SMOKE FAILED" && exit 1)
          echo "Frontend deploy OK"
