name: Flutter Web Production Artifact

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: URL publica da API/front-door
        required: true
        default: https://app.rossicompany.com.br

permissions:
  contents: read

concurrency:
  group: flutter-web-production-artifact
  cancel-in-progress: false

jobs:
  build-web:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release web artifact
        run: flutter build web --release --dart-define=APP_ENV=prod --dart-define=API_BASE_URL=${{ inputs.api_base_url }}

      - name: Upload production web artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-production
          path: build/web
          if-no-files-found: error
